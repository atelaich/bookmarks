/* ============================================================
   CROSS-DEVICE SYNC  (optional, via a private GitHub Gist)
   ------------------------------------------------------------
   The Gist acts as a simple online key/value store. Your token
   is stored ONLY in this browser's localStorage (never exported,
   never sent anywhere except GitHub's API over HTTPS). Use a
   fine-grained token limited to the "Gists" permission, and keep
   the Gist secret/private.
   ============================================================ */
const SYNC_KEY = "myBookmarks.sync";
const GIST_FILENAME = "my-bookmarks.json";
let syncCfg = { token: "", gistId: "", auto: false };
let syncPushTimer = null;
let syncBusy = false;

function loadSyncCfg() {
  try {
    const raw = localStorage.getItem(SYNC_KEY);
    if (raw) {
      const c = JSON.parse(raw);
      syncCfg = { token: c.token || "", gistId: c.gistId || "", auto: !!c.auto };
    }
  } catch (e) { /* ignore */ }
}

function saveSyncCfg() {
  try { localStorage.setItem(SYNC_KEY, JSON.stringify(syncCfg)); } catch (e) {}
}

function syncEnabled() {
  return !!(syncCfg.token && syncCfg.gistId);
}

// Update the little badge in the header.
function updateSyncBadge(stateLabel) {
  const badge = document.getElementById("syncBadge");
  if (!badge) return;
  badge.classList.remove("is-on", "is-syncing");
  const label = badge.querySelector(".label");
  if (stateLabel === "syncing") {
    badge.classList.add("is-on", "is-syncing");
    if (label) label.textContent = "Syncing\u2026";
  } else if (syncEnabled() && syncCfg.auto) {
    badge.classList.add("is-on");
    if (label) label.textContent = "Sync on";
  } else if (syncEnabled()) {
    if (label) label.textContent = "Sync ready";
  } else {
    if (label) label.textContent = "Sync off";
  }
}

// Push current data up to the Gist.
async function gistPush(silent) {
  if (!syncEnabled() || syncBusy) return;
  syncBusy = true;
  updateSyncBadge("syncing");
  try {
    const payload = { app: "My Bookmarks", version: 1, tabs: state.tabs, links: state.links, contacts: state.contacts };
    const res = await fetch("https://api.github.com/gists/" + encodeURIComponent(syncCfg.gistId), {
      method: "PATCH",
      headers: {
        "Authorization": "Bearer " + syncCfg.token,
        "Accept": "application/vnd.github+json",
        "Content-Type": "application/json",
      },
      body: JSON.stringify({ files: { [GIST_FILENAME]: { content: JSON.stringify(payload, null, 2) } } }),
    });
    if (!res.ok) throw new Error("HTTP " + res.status);
    if (!silent) toast("Pushed to cloud.", "success");
  } catch (e) {
    toast("Sync push failed: " + e.message + ". Check token/Gist ID.", "error");
  } finally {
    syncBusy = false;
    updateSyncBadge();
  }
}

// Pull data from the Gist and replace local state.
async function gistPull(silent) {
  if (!syncEnabled() || syncBusy) return;
  syncBusy = true;
  updateSyncBadge("syncing");
  try {
    const res = await fetch("https://api.github.com/gists/" + encodeURIComponent(syncCfg.gistId), {
      headers: {
        "Authorization": "Bearer " + syncCfg.token,
        "Accept": "application/vnd.github+json",
      },
    });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const gist = await res.json();
    const file = gist.files && gist.files[GIST_FILENAME];
    if (!file) {
      // First-time setup: the file doesn't exist yet, so push instead.
      syncBusy = false;
      await gistPush(true);
      if (!silent) toast("Initialised cloud copy.", "success");
      return;
    }
    const data = JSON.parse(file.content);
    if (!Array.isArray(data.tabs) || !Array.isArray(data.links)) throw new Error("Bad data");
    state.tabs = data.tabs;
    state.links = data.links;
    state.contacts = Array.isArray(data.contacts) ? data.contacts : [];
    if (state.ui.activeTabId !== ADMIN_TAB_ID && !getTab(state.ui.activeTabId)) {
      state.ui.activeTabId = state.tabs[0] ? state.tabs[0].id : ADMIN_TAB_ID;
    }
    saveStateLocalOnly();
    render();
    if (!silent) toast("Pulled latest from cloud.", "success");
  } catch (e) {
    toast("Sync pull failed: " + e.message + ". Check token/Gist ID.", "error");
  } finally {
    syncBusy = false;
    updateSyncBadge();
  }
}

// Debounced auto-push after local edits.
function scheduleAutoPush() {
  if (!syncEnabled() || !syncCfg.auto) return;
  clearTimeout(syncPushTimer);
  syncPushTimer = setTimeout(() => gistPush(true), 1500);
}

// Settings modal for sync.
function openSyncSettings() {
  openModal("Cross-Device Sync", `
    <form id="syncForm" novalidate>
      <p class="list-item__meta" style="margin-top:0;">
        Sync your bookmarks across devices using a <strong>private GitHub Gist</strong> as a tiny cloud store.
        Your token is stored only on this device.
      </p>

      <div class="field">
        <label for="syToken">GitHub token <span class="hint">(fine-grained, "Gists" permission)</span></label>
        <input type="password" id="syToken" placeholder="github_pat_\u2026 or ghp_\u2026" autocomplete="off" value="${esc(syncCfg.token)}" />
      </div>

      <div class="field">
        <label for="syGist">Gist ID</label>
        <input type="text" id="syGist" placeholder="e.g. 3f8c1a9b\u2026 (from the gist URL)" autocomplete="off" value="${esc(syncCfg.gistId)}" />
      </div>

      <div class="field" style="display:flex;align-items:center;gap:10px;">
        <input type="checkbox" id="syAuto" style="width:auto;" ${syncCfg.auto ? "checked" : ""} />
        <label for="syAuto" style="margin:0;">Auto-sync changes to the cloud</label>
      </div>

      <p class="note">
        <strong>Setup:</strong> 1) Create a <span class="code-hint">secret</span> gist at gist.github.com with any content.
        2) Copy its ID from the URL (the long code after your username).
        3) Create a fine-grained token (Settings \u2192 Developer settings) with read/write access limited to <span class="code-hint">Gists</span>.
        Keep the gist private; never share your token.
      </p>

      <div class="form-actions" style="justify-content:space-between;">
        <button type="button" class="btn btn--danger" id="syDisable">Turn off</button>
        <span style="display:flex;gap:10px;">
          <button type="button" class="btn" id="syPull">\u2b07\ufe0f Pull now</button>
          <button type="submit" class="btn btn--primary">\ud83d\udcbe Save &amp; Push</button>
        </span>
      </div>
    </form>
  `, (body) => {
    const tokenInput = body.querySelector("#syToken");
    const gistInput = body.querySelector("#syGist");
    const autoInput = body.querySelector("#syAuto");

    function commit() {
      syncCfg.token = tokenInput.value.trim();
      syncCfg.gistId = gistInput.value.trim();
      syncCfg.auto = autoInput.checked;
      saveSyncCfg();
      updateSyncBadge();
    }

    body.querySelector("#syDisable").addEventListener("click", () => {
      syncCfg = { token: "", gistId: "", auto: false };
      saveSyncCfg();
      updateSyncBadge();
      closeModal();
      toast("Sync turned off on this device.", "info");
    });

    body.querySelector("#syPull").addEventListener("click", () => {
      commit();
      if (!syncEnabled()) { toast("Enter a token and Gist ID first.", "error"); return; }
      closeModal();
      gistPull(false);
    });

    body.querySelector("#syncForm").addEventListener("submit", (e) => {
      e.preventDefault();
      commit();
      if (!syncEnabled()) { toast("Enter a token and Gist ID first.", "error"); return; }
      closeModal();
      gistPush(false);
    });
  });
}

document.getElementById("syncBadge").addEventListener("click", openSyncSettings);

// Save locally without triggering an auto-push (used after a pull).
function saveStateLocalOnly() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      tabs: state.tabs, links: state.links, contacts: state.contacts, ui: state.ui,
    }));
  } catch (e) {}
}

/* ============================================================
   TOP-LEVEL RENDER
   ============================================================ */
function render() {
  renderTabbar();
  if (state.ui.activeTabId === ADMIN_TAB_ID) {
    renderAdminView();
  } else {
    renderTabView(state.ui.activeTabId);
  }
}


/* ============================================================
   BOOTSTRAP
   ============================================================ */
loadState();
loadSyncCfg();
render();
updateSyncBadge();

// If auto-sync is enabled, pull the latest from the cloud on startup
// so this device picks up changes made elsewhere.
if (syncEnabled() && syncCfg.auto) {
  gistPull(true);
}

/* ============================================================
   PWA: register the service worker for offline + installability.
   ------------------------------------------------------------
   Only runs over http/https (not file://). Safe no-op otherwise,
   so opening index.html directly still works exactly as before.
   ============================================================ */
if ("serviceWorker" in navigator &&
    (location.protocol === "https:" || location.protocol === "http:")) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(() => {
      // Registration can fail on file:// or if sw.js isn't deployed yet.
      // The app still works fully without it.
    });
  });
}

</script>
</body>
